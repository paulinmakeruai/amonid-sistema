<!DOCTYPE html>
<html lang="pt-br" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMONID | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        meth: { 400: '#4ade80', 600: '#16a34a', 900: '#063737', 950: '#021a1a' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020909; color: #e2e8f0; -webkit-tap-highlight-color: transparent; }
        .periodic-element { font-family: 'Courier Prime', monospace; background-color: #063737; border: 2px solid #4ade80; display: inline-block; padding: 2px 8px; font-weight: bold; color: #4ade80; }
        
        /* Menu Lateral (Desktop) e Inferior (Mobile) */
        .sidebar-link { display: flex; align-items: center; padding: 0.8rem; color: #64748b; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; transition: 0.2s; flex-direction: column; justify-content: center; flex: 1; }
        .sidebar-link.active { color: #4ade80; background: rgba(22, 163, 74, 0.1); }
        
        @media (min-width: 768px) {
            .sidebar-link { flex-direction: row; justify-content: flex-start; padding: 1rem; font-size: 0.8rem; border-left: 3px solid transparent; }
            .sidebar-link.active { border-left-color: #4ade80; }
        }

        .tab-content { display: none; animation: blurIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes blurIn { from { opacity: 0; filter: blur(5px); } to { opacity: 1; filter: blur(0); } }
        
        .card-brba { background: #051414; border: 1px solid #102a2a; border-radius: 8px; }
        .form-input-brba { width: 100%; padding: 0.85rem; background-color: #020909; border: 1px solid #102a2a; color: #4ade80; font-family: 'Courier Prime', monospace; border-radius: 4px; appearance: none; }
        .btn-brba { background-color: #063737; border: 1px solid #4ade80; color: #4ade80; padding: 1rem; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; border-radius: 4px; transition: 0.3s; width: 100%; }
    </style>
</head>
<body class="h-full flex flex-col md:flex-row overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black p-6">
        <div class="w-full max-w-sm p-8 card-brba border-t-4 border-t-meth-600 shadow-2xl">
            <div class="text-center mb-8">
                <div class="periodic-element text-3xl mb-2">Am</div>
                <h1 class="text-xl font-black text-white tracking-[0.2em]">AMONID</h1>
            </div>
            <div class="space-y-4">
                <div id="reg-fields" class="hidden space-y-4">
                    <input type="email" id="auth-email" placeholder="E-MAIL" class="form-input-brba">
                    <input type="text" id="auth-phone" placeholder="WHATSAPP" class="form-input-brba">
                </div>
                <input type="text" id="auth-user" placeholder="USUÁRIO" class="form-input-brba">
                <input type="password" id="auth-pass" placeholder="CHAVE_ACESSO" class="form-input-brba">
                <button onclick="autenticar()" class="btn-brba mt-2">Acessar Sistema</button>
                <button onclick="alternarAuth()" id="btn-switch" class="block w-full text-center text-[10px] text-slate-500 uppercase font-bold tracking-widest">Solicitar Acesso</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden flex flex-col md:flex-row h-full w-full">
        
        <aside class="order-2 md:order-1 w-full md:w-64 bg-black border-t md:border-t-0 md:border-r border-meth-900 flex flex-row md:flex-col z-50">
            <div class="hidden md:flex h-20 flex-col items-center justify-center border-b border-meth-900">
                <div class="periodic-element text-xs mb-1">Am</div>
                <span class="text-[10px] font-black text-meth-600 uppercase tracking-tighter">Amonid v5.0</span>
            </div>
            
            <nav id="nav-links" class="flex flex-row md:flex-col flex-1 overflow-x-auto md:overflow-y-auto no-scrollbar"></nav>
            
            <div class="hidden md:block p-6 border-t border-meth-900">
                <p id="user-display-name" class="text-xs font-black text-white uppercase truncate"></p>
                <p id="user-display-role" class="text-[9px] text-meth-400 font-bold mb-4"></p>
                <button onclick="location.reload()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
            </div>
        </aside>

        <main class="order-1 md:order-2 flex-1 overflow-y-auto p-4 md:p-12 pb-24 md:pb-12">
            
            <section id="aba-intro-cliente" class="tab-content">
                <div class="max-w-3xl mx-auto">
                    <div class="relative w-full h-48 md:h-72 mb-6 overflow-hidden rounded-lg card-brba">
                        <img id="intro-display-img" src="" class="w-full h-full object-cover opacity-40">
                    </div>
                    <h2 id="intro-display-titulo" class="text-2xl md:text-4xl font-black text-white uppercase mb-4 italic"></h2>
                    <p id="intro-display-texto" class="text-sm md:text-lg text-slate-400 leading-relaxed mb-8 font-light"></p>
                    <button onclick="mudarAba('comunicacoes')" class="btn-brba md:w-auto md:px-12">Ver Canais de Contato</button>
                </div>
            </section>

            <section id="aba-comunicacoes" class="tab-content">
                <h2 class="text-xl font-black text-white uppercase mb-6 tracking-widest">Canais</h2>
                <div class="grid grid-cols-1 gap-4">
                    <div class="card-brba p-6">
                        <p class="text-[9px] font-bold text-meth-400 uppercase mb-2">Localização</p>
                        <h4 id="disp-endereco" class="text-sm font-bold text-white mb-3"></h4>
                        <a id="link-maps" href="#" target="_blank" class="text-[10px] text-meth-600 underline uppercase font-black">Abrir GPS</a>
                    </div>
                    <div class="card-brba p-6">
                        <p class="text-[9px] font-bold text-meth-400 uppercase mb-2">Contatos</p>
                        <p class="text-xs mb-1">WhatsApp: <span id="disp-zap" class="text-white font-mono"></span></p>
                        <p class="text-xs">E-mail: <span id="disp-email" class="text-white font-mono"></span></p>
                    </div>
                </div>
            </section>

            <section id="aba-catalogo" class="tab-content">
                <h2 class="text-xl font-black text-white uppercase mb-6">Estoque</h2>
                <div id="grid-catalogo" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

            <section id="aba-financas" class="tab-content">
                <h2 class="text-xl font-black uppercase mb-6">Financeiro</h2>
                <div class="grid grid-cols-1 gap-3 mb-6">
                    <div class="card-brba p-4 flex justify-between items-center">
                        <span class="text-[10px] uppercase opacity-60">Faturamento</span>
                        <span id="faturamento-val" class="text-lg font-black text-white"></span>
                    </div>
                    <div class="card-brba p-4 flex justify-between items-center">
                        <span class="text-[10px] uppercase opacity-60">Custos</span>
                        <span id="despesa-val" class="text-lg font-black text-red-500"></span>
                    </div>
                    <div class="card-brba p-4 border-t-2 border-meth-600">
                        <span class="text-[10px] uppercase opacity-60">Lucro Real</span>
                        <p id="lucro-val" class="text-2xl font-black text-meth-400"></p>
                    </div>
                </div>
                <div class="card-brba p-6 flex justify-center">
                    <div class="w-full max-w-[250px] aspect-square">
                        <canvas id="chartFinanceiro"></canvas>
                    </div>
                </div>
            </section>

            <section id="aba-pedidos" class="tab-content"><h2 class="text-xl font-black uppercase mb-6">Pedidos</h2><div id="grid-pedidos" class="space-y-3"></div></section>
            <section id="aba-produtos" class="tab-content"><h2 class="text-xl font-black mb-6 uppercase">Novo Produto</h2><div class="card-brba p-4 space-y-3 mb-6"><input type="text" id="p-nome" placeholder="Nome" class="form-input-brba"><input type="number" id="p-preco" placeholder="Preço" class="form-input-brba"><input type="text" id="p-img" placeholder="URL Imagem" class="form-input-brba"><input type="text" id="p-qtd" placeholder="Qtd" class="form-input-brba"><textarea id="p-desc" class="form-input-brba" placeholder="Descrição"></textarea><button onclick="salvarProduto()" class="btn-brba">Adicionar</button></div><div id="lista-produtos" class="grid grid-cols-2 gap-2"></div></section>
            <section id="aba-usuarios" class="tab-content"><h2 class="text-xl font-black mb-6 uppercase">Usuários</h2><div id="lista-usuarios-admin" class="space-y-2"></div></section>
            <section id="aba-config-cargos" class="tab-content"><h2 class="text-xl font-black mb-6 uppercase italic">Ranks</h2><div class="card-brba p-4 mb-4"><input type="text" id="role-name" placeholder="Nome do Rank" class="form-input-brba mb-4"><div id="perms-checkboxes" class="grid grid-cols-2 gap-2 mb-4"></div><button onclick="criarNovoCargo()" class="btn-brba">Criar</button></div><div id="lista-cargos-existentes" class="space-y-2"></div></section>
            <section id="aba-despesas" class="tab-content"><h2 class="text-xl font-black mb-6 uppercase">Despesas</h2><div class="card-brba p-4 space-y-3 mb-6"><input type="text" id="d-desc" placeholder="Desc" class="form-input-brba"><input type="number" id="d-valor" placeholder="Valor" class="form-input-brba"><button onclick="salvarDespesa()" class="btn-brba">Lançar</button></div><div id="lista-despesas" class="space-y-2"></div></section>
            <section id="aba-config-intro" class="tab-content"><h2 class="text-xl font-black mb-6 uppercase">Config Início</h2><div class="card-brba p-4 space-y-3"><input type="text" id="edit-intro-titulo" class="form-input-brba"><input type="text" id="edit-intro-img" class="form-input-brba"><textarea id="edit-intro-texto" class="form-input-brba h-32"></textarea><button onclick="salvarIntroducao()" class="btn-brba">Salvar</button></div></section>
            <section id="aba-config-comunic" class="tab-content"><h2 class="text-xl font-black mb-6 uppercase">Config Canais</h2><div class="card-brba p-4 space-y-3"><input type="text" id="edit-endereco" class="form-input-brba"><input type="text" id="edit-maps" class="form-input-brba"><input type="text" id="edit-zap" class="form-input-brba"><input type="text" id="edit-email-contato" class="form-input-brba"><button onclick="salvarComunicacoes()" class="btn-brba">Salvar</button></div></section>

        </main>
    </div>

    <script>
        const TELAS = [
            {id: 'intro-cliente', nome: 'Início', icon: '🏠'}, {id: 'comunicacoes', nome: 'Canais', icon: '📞'}, 
            {id: 'catalogo', nome: 'Estoque', icon: '📦'}, {id: 'financas', nome: 'Lucros', icon: '📈'}, 
            {id: 'despesas', nome: 'Gastos', icon: '💸'}, {id: 'produtos', nome: 'Itens', icon: '➕'}, 
            {id: 'pedidos', nome: 'Ordens', icon: '📝'}, {id: 'usuarios', nome: 'Rede', icon: '👥'}, 
            {id: 'config-cargos', nome: 'Ranks', icon: '🛡️'}, {id: 'config-intro', nome: 'Edit.I', icon: '⚙️'}, 
            {id: 'config-comunic', nome: 'Edit.C', icon: '⚙️'}
        ];

        let db = JSON.parse(localStorage.getItem('amonid_final_v5')) || {
            usuarios: [{user: 'admin', pass: '1234', email: 'adm@amonid.com', phone: '00', role: 'Diretor'}],
            produtos: [], pedidos: [], despesas: [],
            introducao: { titulo: 'AMONID SYSTEM', texto: 'Qualidade superior em cada grama.', imagem: '' },
            canais: { endereco: 'Senador Canedo, GO', maps: '', zap: '', email: 'contato@amonid.com' },
            cargos: {
                'Diretor': ['intro-cliente', 'comunicacoes', 'catalogo', 'financas', 'despesas', 'produtos', 'pedidos', 'usuarios', 'config-cargos', 'config-intro', 'config-comunic'],
                'Cliente': ['intro-cliente', 'comunicacoes', 'catalogo']
            }
        };

        let userAtivo = null; let modoReg = false; let myChart = null;
        function salvar() { localStorage.setItem('amonid_final_v5', JSON.stringify(db)); renderizar(); }
        function alternarAuth() { modoReg = !modoReg; document.getElementById('reg-fields').classList.toggle('hidden'); }
        
        function autenticar() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(modoReg) {
                const n = { user:u, pass:p, email:document.getElementById('auth-email').value, phone:document.getElementById('auth-phone').value, role: 'Cliente' };
                db.usuarios.push(n); userAtivo = n; entrar();
            } else {
                const conta = db.usuarios.find(x => x.user === u && x.pass === p);
                if(conta) { userAtivo = conta; entrar(); } else { alert("ACESSO NEGADO."); }
            }
        }

        function entrar() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userAtivo.user;
            document.getElementById('user-display-role').innerText = userAtivo.role;
            montarMenu(); salvar();
        }

        function montarMenu() {
            const nav = document.getElementById('nav-links'); nav.innerHTML = '';
            const perms = db.cargos[userAtivo.role] || ['intro-cliente', 'comunicacoes', 'catalogo'];
            perms.forEach((id) => {
                const info = TELAS.find(x => x.id === id);
                if(info) nav.innerHTML += `<button onclick="mudarAba('${id}')" id="btn-${id}" class="sidebar-link"><span class="md:hidden text-lg">${info.icon}</span><span class="text-[9px] md:text-xs">${info.nome}</span></button>`;
            });
            mudarAba(perms[0]);
        }

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-'+aba).classList.add('active');
            if(document.getElementById('btn-'+aba)) document.getElementById('btn-'+aba).classList.add('active');
            if(aba === 'financas') atualizarGrafico();
            if(aba === 'config-cargos') renderizarCargos();
            if(aba === 'config-intro') { document.getElementById('edit-intro-titulo').value = db.introducao.titulo; document.getElementById('edit-intro-texto').value = db.introducao.texto; document.getElementById('edit-intro-img').value = db.introducao.imagem; }
            if(aba === 'config-comunic') { document.getElementById('edit-endereco').value = db.canais.endereco; document.getElementById('edit-maps').value = db.canais.maps; document.getElementById('edit-zap').value = db.canais.zap; document.getElementById('edit-email-contato').value = db.canais.email; }
        }

        function salvarIntroducao() { db.introducao = { titulo: document.getElementById('edit-intro-titulo').value, texto: document.getElementById('edit-intro-texto').value, imagem: document.getElementById('edit-intro-img').value }; salvar(); alert("OK"); }
        function salvarComunicacoes() { db.canais = { endereco: document.getElementById('edit-endereco').value, maps: document.getElementById('edit-maps').value, zap: document.getElementById('edit-zap').value, email: document.getElementById('edit-email-contato').value }; salvar(); alert("OK"); }
        function salvarProduto() { const n = document.getElementById('p-nome').value; if(n){ db.produtos.push({nome:n, preco:parseFloat(document.getElementById('p-preco').value), img:document.getElementById('p-img').value, qtd:document.getElementById('p-qtd').value, desc:document.getElementById('p-desc').value}); salvar(); }}
        function solicitarPedido(n, p) { db.pedidos.push({prod:n, cli:userAtivo.user, zapCli: userAtivo.phone, valor:p, status:'Pendente', data:new Date().toLocaleDateString()}); alert("Solicitado!"); salvar(); }
        function salvarDespesa() { const v = parseFloat(document.getElementById('d-valor').value); if(v){ db.despesas.push({desc:document.getElementById('d-desc').value, valor:v}); salvar(); }}
        function entregarPedido(i) { db.pedidos[i].status = 'Entregue'; salvar(); }
        function excluir(t, i) { if(confirm("Apagar?")) { db[t].splice(i,1); salvar(); } }
        function criarNovoCargo() { const n = document.getElementById('role-name').value; const chks = document.querySelectorAll('.role-chk:checked'); if(n && chks.length){ db.cargos[n] = Array.from(chks).map(x => x.value); salvar(); renderizarCargos(); }}
        function renderizarCargos() {
            document.getElementById('perms-checkboxes').innerHTML = TELAS.map(t => `<label class="text-[9px] uppercase font-bold flex gap-2 border border-meth-900 p-2 rounded"><input type="checkbox" value="${t.id}" class="role-chk"> ${t.nome}</label>`).join('');
            document.getElementById('lista-cargos-existentes').innerHTML = Object.keys(db.cargos).map(c => `<div class="card-brba p-3 flex justify-between text-[10px] uppercase font-bold"><span>${c}</span>${c!=='Diretor'&&c!=='Cliente' ? `<button onclick="delete db.cargos['${c}']; salvar(); renderizarCargos();" class="text-red-500">X</button>` : ''}</div>`).join('');
        }

        function renderizar() {
            document.getElementById('intro-display-titulo').innerText = db.introducao.titulo;
            document.getElementById('intro-display-texto').innerText = db.introducao.texto;
            document.getElementById('intro-display-img').src = db.introducao.imagem || 'https://images.unsplash.com/photo-1532187896946-2f5a512c0b50?q=80&w=1000&auto=format&fit=crop';
            document.getElementById('disp-endereco').innerText = db.canais.endereco;
            document.getElementById('link-maps').href = db.canais.maps || '#';
            document.getElementById('disp-zap').innerText = db.canais.zap;
            document.getElementById('disp-email').innerText = db.canais.email;

            document.getElementById('grid-catalogo').innerHTML = db.produtos.map(p => `
                <div class="card-brba overflow-hidden flex flex-col">
                    <img src="${p.img}" class="w-full h-32 object-cover opacity-60">
                    <div class="p-4 flex-1 flex flex-col justify-between">
                        <div><h4 class="font-black text-white text-xs uppercase">${p.nome}</h4><p class="text-[9px] text-slate-500 mt-1">${p.desc}</p></div>
                        <div class="flex justify-between items-center mt-4"><span class="text-meth-400 font-black text-sm">$ ${p.preco}</span>
                        <button onclick="solicitarPedido('${p.nome}',${p.preco})" class="bg-meth-900 text-meth-400 border border-meth-400 px-3 py-1 text-[9px] font-black uppercase rounded">Pedir</button></div>
                    </div>
                </div>`).join('');

            document.getElementById('grid-pedidos').innerHTML = db.pedidos.map((p,i) => `
                <div class="card-brba p-3 border-l-4 ${p.status==='Entregue'?'border-l-meth-400':'border-l-amber-600'}">
                    <div class="flex justify-between items-start"><div class="font-mono"><p class="text-[10px] font-black text-white uppercase">${p.prod}</p><p class="text-[8px] text-slate-500 uppercase">${p.cli}</p></div>
                    <button onclick="excluir('pedidos',${i})" class="text-red-900 font-black text-xs">X</button></div>
                    <div class="flex gap-2 mt-3">${p.status==='Pendente' ? `<a href="https://wa.me/${p.zapCli}" target="_blank" class="flex-1 text-center bg-emerald-900 text-emerald-400 border border-emerald-400 py-2 text-[8px] font-black uppercase rounded">Zap</a><button onclick="entregarPedido(${i})" class="flex-1 bg-meth-900 text-meth-400 border border-meth-400 py-2 text-[8px] font-black uppercase rounded">Entregar</button>` : `<span class="text-[8px] text-meth-400 font-black uppercase">Finalizado</span>`}</div>
                </div>`).join('');

            document.getElementById('lista-produtos').innerHTML = db.produtos.map((p,i) => `<div class="card-brba p-2 flex justify-between items-center text-[9px] uppercase"><span>${p.nome}</span><button onclick="excluir('produtos',${i})" class="text-red-900 font-bold">Remover</button></div>`).join('');
            document.getElementById('lista-usuarios-admin').innerHTML = db.usuarios.map((u, i) => `<div class="card-brba p-3 flex justify-between items-center"><div class="text-[10px]"><p class="font-black text-white uppercase">${u.user}</p><p class="opacity-40 uppercase text-[8px]">${u.role}</p></div>${u.user!=='admin'?`<button onclick="excluir('usuarios',${i})" class="text-red-700 font-black text-[8px]">EXPULSAR</button>`:''}</div>`).join('');
            
            const f = db.pedidos.filter(p=>p.status==='Entregue').reduce((a,p)=>a+p.valor,0);
            const d = db.despesas.reduce((a,d)=>a+d.valor,0);
            document.getElementById('faturamento-val').innerText = `$ ${f.toLocaleString()}`;
            document.getElementById('despesa-val').innerText = `$ ${d.toLocaleString()}`;
            document.getElementById('lucro-val').innerText = `$ ${(f-d).toLocaleString()}`;
        }

        function atualizarGrafico() {
            const f = db.pedidos.filter(p=>p.status==='Entregue').reduce((a,p)=>a+p.valor,0);
            const d = db.despesas.reduce((a,d)=>a+d.valor,0);
            const ctx = document.getElementById('chartFinanceiro').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Vendas','Custos'], datasets:[{data:[f||1,d||0], backgroundColor:['#4ade80','#021a1a'], borderWidth:0}]}, options:{cutout:'80%', plugins:{legend:{display:false}}} });
        }
    </script>
</body>
</html>
